<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Договор консультационных услуг | Тренажер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #dce4ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1rem;
        }

        .quiz-container {
            max-width: 780px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.75rem;
            box-shadow: 0 18px 32px -12px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .quiz-header {
            padding: 1rem 1.5rem 0.75rem 1.5rem;
            border-bottom: 1px solid rgba(100, 160, 210, 0.3);
            background: #fefefe;
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .question-counter, .score-badge {
            font-size: 0.7rem;
            font-weight: 500;
            color: #1e4663;
            background: #eef4fc;
            padding: 0.2rem 0.75rem;
            border-radius: 30px;
            letter-spacing: 0.2px;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a2c3e;
            margin-top: 0.2rem;
            letter-spacing: -0.2px;
        }

        .question-area {
            padding: 1.2rem 1.5rem 0.8rem 1.5rem;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.35;
            color: #0b2b3f;
            margin-bottom: 1rem;
            border-left: 4px solid #7bb3db;
            padding-left: 0.9rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1rem;
        }

        .option-item {
            border: 1.5px solid #cde3f5;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            background: #ffffff;
            transition: all 0.15s ease;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            font-size: 0.88rem;
            line-height: 1.35;
            color: #1f3b4c;
        }

        .option-item:hover {
            background: #f6fafe;
            border-color: #7bb3db;
        }

        .option-radio {
            appearance: none;
            -webkit-appearance: none;
            width: 1.1rem;
            height: 1.1rem;
            border: 1.8px solid #8bb9dd;
            border-radius: 50%;
            margin-top: 0.1rem;
            background: white;
            transition: 0.08s;
            flex-shrink: 0;
            cursor: pointer;
        }
        .option-radio:checked {
            border-color: #2c7ab1;
            background-color: #2c7ab1;
            box-shadow: inset 0 0 0 2.5px white;
        }

        .option-radio[type="checkbox"] {
            border-radius: 4px;
        }
        .option-radio[type="checkbox"]:checked {
            background-color: #2c7ab1;
            border-color: #2c7ab1;
            box-shadow: none;
            position: relative;
        }
        .option-radio[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 0.75rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .option-text {
            flex: 1;
            font-weight: 500;
            cursor: pointer;
        }

        .option-item.correct-highlight {
            background-color: #e2f3e9;
            border-color: #2b8c5e;
        }
        .option-item.wrong-highlight {
            background-color: #ffe8e8;
            border-color: #d9534f;
        }

        .actions {
            padding: 0.25rem 1.5rem 1.2rem 1.5rem;
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.5rem 1.4rem;
            border-radius: 2rem;
            border: none;
            cursor: pointer;
            transition: all 0.18s;
            background: #f0f4f9;
            color: #1f4e6e;
        }

        .btn-primary {
            background: #2c7ab1;
            color: white;
            box-shadow: 0 2px 6px rgba(44,122,177,0.2);
        }
        .btn-primary:hover {
            background: #1f6190;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #eef2f7;
            border: 1px solid #cbdbe2;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .explanation-box {
            margin: 0 1.5rem 1rem 1.5rem;
            background: #f7fbfe;
            border-radius: 0.9rem;
            padding: 0.75rem 1rem;
            border-left: 4px solid #7bb3db;
            font-size: 0.8rem;
            color: #1e4663;
            line-height: 1.4;
        }

        .result-screen {
            text-align: center;
            padding: 1.8rem 1.5rem 2.2rem;
        }

        .result-icon {
            font-size: 2.6rem;
            margin-bottom: 0.4rem;
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #1a2c3e;
        }

        .result-score {
            font-size: 1.05rem;
            font-weight: 600;
            background: #eef4fc;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            color: #1f6190;
        }

        @media (max-width: 550px) {
            .quiz-container { border-radius: 1.4rem; }
            .question-area { padding: 1rem 1.2rem 0.6rem 1.2rem; }
            .question-text { font-size: 0.9rem; }
            .option-item { padding: 0.5rem 0.8rem; font-size: 0.82rem; }
            .actions { padding: 0.2rem 1.2rem 1rem 1.2rem; }
            button { padding: 0.45rem 1.2rem; }
            h2 { font-size: 1.1rem; }
            .explanation-box { margin: 0 1.2rem 0.8rem 1.2rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="app"></div>

<script>
    // ===== БАЗОВЫЕ ВОПРОСЫ (исправлены кавычки, текст лаконичный) =====
    const RAW_QUESTIONS = [
        {
            text: "Расторжение договора: что важно включить?",
            options: [
                "Право на односторонний отказ (например, при требовании незаконных услуг)",
                "Срок расторжения, если клиент не предоставил документы",
                "Фразу «расторжение при существенном нарушении (ст. 450 ГК РФ)»",
                "Этот пункт не обязателен"
            ],
            correctIndices: [0],
            multiple: false,
            explanation: "Закрепите право на односторонний отказ, чтобы расторгнуть договор без штрафов при требовании незаконных услуг (налоговая оптимизация и т.п.)."
        },
        {
            text: "Ответственность и форс-мажор. Что прописать?",
            options: [
                "Штрафы и пени за просрочку оплаты",
                "Разумный процент санкций (иначе суд снизит)",
                "Условия форс-мажора (мобилизация, ЧС)",
                "Этот пункт не обязателен"
            ],
            correctIndices: [0, 1, 2],
            multiple: true,
            explanation: "Пропишите штрафы за задержку оплаты, разумный размер санкций и отдельно — форс-мажорные обстоятельства (мобилизация, стихия)."
        },
        {
            text: "Конфиденциальность и коммерческая тайна: что включить?",
            options: [
                "Информация от клиента не подлежит разглашению",
                "Перечень неразглашаемых сведений, порядок доступа, использование",
                "Упоминание закона о персональных данных",
                "Этот пункт не обязателен"
            ],
            correctIndices: [1],
            multiple: false,
            explanation: "Составьте перечень данных, которые нельзя разглашать, порядок использования и доступ к ним — это защитит вас и клиента."
        },
        {
            text: "Что отразить в заключительной части договора?",
            options: [
                "То, что не указали в других разделах (запрет на передачу прав третьим лицам)",
                "Реквизиты сторон",
                "Контактные данные",
                "Этот пункт не обязателен"
            ],
            correctIndices: [0],
            multiple: false,
            explanation: "В заключительных положениях пропишите запрет на передачу прав/обязанностей другим лицам (например, привлечение соисполнителей без согласия)."
        }
    ];

    function replaceYo(str) {
        if (!str) return str;
        return str.replace(/ё/g, 'е').replace(/Ё/g, 'Е');
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledQuestions() {
        return RAW_QUESTIONS.map(q => {
            const optsWithIndex = q.options.map((optText, idx) => ({ text: replaceYo(optText), originalIndex: idx }));
            const shuffledOpts = shuffleArray([...optsWithIndex]);
            const correctIndicesMap = q.correctIndices.map(origIdx => {
                for (let i = 0; i < shuffledOpts.length; i++) {
                    if (shuffledOpts[i].originalIndex === origIdx) return i;
                }
                return -1;
            }).filter(i => i !== -1);
            
            return {
                text: replaceYo(q.text),
                options: shuffledOpts.map(item => item.text),
                correctIndices: correctIndicesMap,
                multiple: q.multiple,
                explanation: replaceYo(q.explanation)
            };
        });
    }

    let CURRENT_QUESTIONS = buildShuffledQuestions();

    let currentState = {
        phase: 'quiz',
        currentQuestionIdx: 0,
        userAnswers: [],
        explanationForCurrent: null,
        isAnswerChecked: false,
        selectedOptionsTemp: new Set(),
        totalQuestions: CURRENT_QUESTIONS.length
    };

    const appContainer = document.getElementById('app');

    function getCurrentQuestion() {
        return CURRENT_QUESTIONS[currentState.currentQuestionIdx];
    }

    function isAnswerCorrect(selectedSet, correctIndices) {
        if (selectedSet.size !== correctIndices.length) return false;
        for (let idx of correctIndices) {
            if (!selectedSet.has(idx)) return false;
        }
        return true;
    }

    function recordCurrentAnswer() {
        const idx = currentState.currentQuestionIdx;
        const question = getCurrentQuestion();
        const selectedSet = currentState.selectedOptionsTemp;
        if (selectedSet.size === 0) return false;
        const isCorrect = isAnswerCorrect(selectedSet, question.correctIndices);
        currentState.userAnswers[idx] = {
            selectedIndices: Array.from(selectedSet),
            isFullyCorrect: isCorrect,
            answered: true
        };
        return true;
    }

    function getCorrectCount() {
        let correct = 0;
        for (let i = 0; i < currentState.userAnswers.length; i++) {
            if (currentState.userAnswers[i] && currentState.userAnswers[i].isFullyCorrect) correct++;
        }
        return correct;
    }

    function allQuestionsAnswered() {
        return currentState.userAnswers.length === CURRENT_QUESTIONS.length && 
               currentState.userAnswers.every(a => a !== undefined && a.answered === true);
    }

    function showFinalResult() {
        const correctCount = getCorrectCount();
        const total = CURRENT_QUESTIONS.length;
        const allCorrect = (correctCount === total);
        const icon = allCorrect ? '🏆✨' : '📋';
        const title = allCorrect ? 'Молодец!' : 'Ваш результат';
        
        const resultHtml = `
            <div class="quiz-header">
                <div class="progress-area">
                    <span class="question-counter">Итог</span>
                    <span class="score-badge">${correctCount}/${total}</span>
                </div>
                <h2>Договор консультационных услуг</h2>
            </div>
            <div class="result-screen">
                <div class="result-icon">${icon}</div>
                <div class="result-title">${title}</div>
                <div class="result-score">${correctCount} из ${total} баллов</div>
                <button class="btn-primary" id="restartBtn">Пройти заново</button>
            </div>
        `;
        appContainer.innerHTML = resultHtml;
        document.getElementById('restartBtn')?.addEventListener('click', () => resetAndRestart());
    }

    function handleNext() {
        const nextIdx = currentState.currentQuestionIdx + 1;
        if (nextIdx >= CURRENT_QUESTIONS.length) {
            showFinalResult();
            return;
        }
        currentState.currentQuestionIdx = nextIdx;
        currentState.phase = 'quiz';
        currentState.isAnswerChecked = false;
        currentState.explanationForCurrent = null;
        currentState.selectedOptionsTemp.clear();
        const saved = currentState.userAnswers[nextIdx];
        if (saved && saved.selectedIndices) {
            saved.selectedIndices.forEach(idx => currentState.selectedOptionsTemp.add(idx));
        }
        render();
    }

    function handleCheck() {
        if (currentState.isAnswerChecked) return;
        const selectedSet = currentState.selectedOptionsTemp;
        if (selectedSet.size === 0) {
            alert("Выберите вариант(ы) ответа.");
            return;
        }
        const idx = currentState.currentQuestionIdx;
        const question = getCurrentQuestion();
        const isCorrect = isAnswerCorrect(selectedSet, question.correctIndices);
        
        if (!currentState.userAnswers[idx]) {
            currentState.userAnswers[idx] = {
                selectedIndices: Array.from(selectedSet),
                isFullyCorrect: isCorrect,
                answered: true
            };
        } else {
            currentState.userAnswers[idx].selectedIndices = Array.from(selectedSet);
            currentState.userAnswers[idx].isFullyCorrect = isCorrect;
            currentState.userAnswers[idx].answered = true;
        }
        currentState.isAnswerChecked = true;
        currentState.explanationForCurrent = question.explanation;
        currentState.phase = 'explanation';
        render();
    }

    function toggleOption(optionIndex) {
        if (currentState.phase !== 'quiz') return;
        if (currentState.isAnswerChecked) return;
        const question = getCurrentQuestion();
        if (question.multiple) {
            if (currentState.selectedOptionsTemp.has(optionIndex)) {
                currentState.selectedOptionsTemp.delete(optionIndex);
            } else {
                currentState.selectedOptionsTemp.add(optionIndex);
            }
        } else {
            currentState.selectedOptionsTemp.clear();
            currentState.selectedOptionsTemp.add(optionIndex);
        }
        render();
    }

    function resetAndRestart() {
        CURRENT_QUESTIONS = buildShuffledQuestions();
        currentState = {
            phase: 'quiz',
            currentQuestionIdx: 0,
            userAnswers: [],
            explanationForCurrent: null,
            isAnswerChecked: false,
            selectedOptionsTemp: new Set(),
            totalQuestions: CURRENT_QUESTIONS.length
        };
        render();
    }

    function render() {
        if (!appContainer) return;
        if (allQuestionsAnswered() && (currentState.phase === 'quiz' || currentState.phase === 'explanation') && currentState.currentQuestionIdx >= CURRENT_QUESTIONS.length) {
            showFinalResult();
            return;
        }
        
        const total = CURRENT_QUESTIONS.length;
        const qIdx = currentState.currentQuestionIdx;
        const question = CURRENT_QUESTIONS[qIdx];
        const isCheckedPhase = (currentState.phase === 'explanation');
        const isMultiple = question.multiple;
        
        let savedAnswer = currentState.userAnswers[qIdx];
        let selectedSet = currentState.selectedOptionsTemp;
        
        let highlightMap = {};
        if (isCheckedPhase && savedAnswer) {
            const correctIndicesSet = new Set(question.correctIndices);
            for (let idx of question.correctIndices) {
                highlightMap[idx] = 'correct';
            }
            for (let idx of savedAnswer.selectedIndices) {
                if (!correctIndicesSet.has(idx)) {
                    highlightMap[idx] = 'wrong';
                }
            }
        }
        
        let optionsHtml = '';
        question.options.forEach((opt, idx) => {
            let additionalClass = '';
            if (highlightMap[idx] === 'correct') additionalClass = 'correct-highlight';
            if (highlightMap[idx] === 'wrong') additionalClass = 'wrong-highlight';
            let isChecked = selectedSet.has(idx);
            const disabledAttr = (isCheckedPhase) ? 'disabled' : '';
            const inputType = (isMultiple && !isCheckedPhase) ? 'checkbox' : 'radio';
            const nameAttr = (inputType === 'radio') ? 'questionOption' : `opt_${idx}`;
            
            optionsHtml += `
                <div class="option-item ${additionalClass}" data-opt-index="${idx}">
                    <input type="${inputType}" name="${nameAttr}" class="option-radio" value="${idx}" id="opt_${idx}" ${isChecked ? 'checked' : ''} ${disabledAttr}>
                    <label for="opt_${idx}" class="option-text">${escapeHtml(opt)}</label>
                </div>
            `;
        });
        
        let explanationBlock = '';
        if (currentState.phase === 'explanation' && currentState.explanationForCurrent) {
            explanationBlock = `
                <div class="explanation-box">
                    <strong>📖 Пояснение:</strong><br>${escapeHtml(currentState.explanationForCurrent)}
                </div>
            `;
        }
        
        let actionButtons = '';
        if (currentState.phase === 'quiz') {
            actionButtons = `<div class="actions"><button class="btn-primary" id="checkBtn">✓ Проверить</button></div>`;
        } else {
            actionButtons = `<div class="actions"><button class="btn-primary" id="nextBtn">Далее →</button></div>`;
        }
        
        const answeredCount = currentState.userAnswers.filter(a => a !== undefined && a.answered === true).length;
        const multipleHint = isMultiple && currentState.phase === 'quiz' ? '<span style="font-size:0.65rem; margin-left:0.5rem; color:#5a7a9a;">(выберите несколько)</span>' : '';
        
        const headerHtml = `
            <div class="quiz-header">
                <div class="progress-area">
                    <span class="question-counter">${qIdx+1}/${total}</span>
                    <span class="score-badge">✅ ${answeredCount}/${total}</span>
                </div>
                <h2>Договор консультационных услуг</h2>
            </div>
            <div class="question-area">
                <div class="question-text">${escapeHtml(question.text)} ${multipleHint}</div>
                <div class="options-list" id="optionsContainer">
                    ${optionsHtml}
                </div>
            </div>
            ${explanationBlock}
            ${actionButtons}
        `;
        
        appContainer.innerHTML = headerHtml;
        
        // обработка кликов по блоку option-item
        const optionDivs = document.querySelectorAll('.option-item');
        optionDivs.forEach(div => {
            const input = div.querySelector('.option-radio');
            if (input && !input.disabled) {
                div.addEventListener('click', (e) => {
                    // избегаем двойного срабатывания, если клик на label или input
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
                    const idxAttr = div.getAttribute('data-opt-index');
                    if (idxAttr !== null && currentState.phase === 'quiz' && !currentState.isAnswerChecked) {
                        const idxNum = parseInt(idxAttr, 10);
                        toggleOption(idxNum);
                    }
                });
            }
        });
        
        const inputs = document.querySelectorAll('.option-radio');
        inputs.forEach(input => {
            input.addEventListener('change', (e) => {
                if (currentState.phase === 'quiz' && !currentState.isAnswerChecked) {
                    const val = parseInt(e.target.value, 10);
                    toggleOption(val);
                }
            });
        });
        
        const checkBtn = document.getElementById('checkBtn');
        if (checkBtn) checkBtn.addEventListener('click', handleCheck);
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.addEventListener('click', handleNext);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    render();
</script>
</body>
</html>
